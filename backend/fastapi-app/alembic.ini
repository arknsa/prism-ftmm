# Alembic configuration for the FTMM Alumni backend.
# The database URL is injected at runtime from app settings (see migrations/env.py);
# it is intentionally NOT stored here so no secret lands in version control.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is set programmatically in migrations/env.py

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
